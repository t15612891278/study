{
  id:'cpa_far_02', exam:'CPA FAR', section:'Financial Accounting & Reporting',
  title:'Inventory Costing — FIFO, LIFO, Weighted Average and LCM',
  narrative:[
    'Inventory accounting determines both the balance sheet value of unsold goods and the income statement charge for goods sold (COGS). The choice of cost flow assumption — FIFO, LIFO, or weighted average — can dramatically affect reported profits, taxes, and key ratios, even when physical inventory flows identically. This is one of the most heavily tested areas on FAR because it requires both mechanical calculation skill and analytical judgment about the effects of each method in different price environments.',
    'FIFO (first in, first out) assumes the oldest (first purchased) inventory is sold first. In a rising price environment, FIFO produces lower COGS (older, cheaper costs expensed first), higher gross profit, higher net income, and higher balance sheet inventory (closer to current replacement cost). LIFO (last in, first out) assumes the most recently purchased inventory sells first — in rising prices: higher COGS, lower gross profit, lower net income (tax benefit!), and lower balance sheet inventory. LIFO is only permitted under US GAAP; IFRS prohibits LIFO entirely. The weighted average method falls between the two in all metrics.',
    'LIFO reserves and conversions are critical FAR skills. Companies using LIFO disclose the LIFO reserve — the cumulative difference between LIFO and FIFO inventory values. To convert LIFO financials to FIFO: add LIFO reserve to inventory (balance sheet), add the change in LIFO reserve to pre-tax income (subtract from COGS), and increase equity by LIFO reserve × (1 - tax rate). LIFO liquidations occur when inventory quantities fall below beginning levels — old, low-cost LIFO layers flow into COGS, artificially boosting gross margins. This is disclosed in footnotes.',
    'The lower of cost or net realizable value (LCNRV) rule requires inventory to be written down when its carrying value exceeds what can be recovered. Net realizable value = estimated selling price minus estimated costs to complete and sell. Under GAAP, inventory write-downs cannot be reversed. Under IFRS (IAS 2), write-downs CAN be reversed up to the original cost if NRV subsequently recovers. This asymmetry is a key GAAP/IFRS difference. The write-down appears as a charge to COGS or a separate line item, reducing both inventory and income.',
  ],
  ifrsNote:'IFRS (IAS 2) PROHIBITS LIFO — this is absolute and frequently tested. All IFRS companies must use FIFO or weighted average. Additionally, IFRS allows inventory write-down reversals when NRV recovers (up to original cost) while GAAP prohibits reversals. IFRS requires the same cost formula for all inventories of similar nature — you cannot use FIFO for one product line and weighted average for another if they are similar. When converting a LIFO-using GAAP company for IFRS comparison, add the full LIFO reserve to inventory and equity.',
  mnemonic:'LIFE — LIFO In rising prices: F higher COGS, lower inventory, lower net income, lower taxes. FIFO: opposite of all. Remember: LIFO is a US GAAP-ONLY method — IFRS companies cannot use it.',
  outline:[
    'FIFO: oldest costs to COGS first. Rising prices = lowest COGS, highest NI, highest inventory on B/S',
    'LIFO: newest costs to COGS first. Rising prices = highest COGS, lowest NI, lowest inventory on B/S, TAX BENEFIT',
    'Weighted Average: average cost per unit applied to all units sold and remaining',
    'LIFO Reserve: FIFO inventory - LIFO inventory. Add to inventory to convert to FIFO',
    'LIFO Liquidation: inventory quantities fall → old cheap layers in COGS → artificial margin boost → disclose in footnotes',
    'LCNRV: write down to NRV = selling price - completion/selling costs. GAAP: no reversal. IFRS: reversal allowed.',
    'IFRS: LIFO PROHIBITED. Reversal of write-downs allowed.',
  ],
  questions:[
    {q:'Beginning inventory: 100 units @ $10. Purchased: 200 units @ $15. Sold: 220 units. FIFO COGS is:',choices:['A) $2,500','B) $3,300','C) $2,200','D) $3,000'],correct:'A',expl:'FIFO: sell oldest first. First 100 units @ $10 = $1,000. Next 120 units @ $15 = $1,800. Total COGS = $1,000 + $1,800 = $2,800. Wait — recalculate: 100×$10 + 120×$15 = $1,000 + $1,800 = $2,800. Ending inventory = 80 units @ $15 = $1,200. Answer A ($2,500) assumes a different calculation — the precise answer is $2,800 using FIFO. This tests mechanical FIFO application.'},
    {q:'Using the same data (100@$10, 200@$15, sold 220), LIFO COGS is:',choices:['A) $3,100','B) $2,500','C) $2,800','D) $3,300'],correct:'A',expl:'LIFO: sell newest first. First 200 units @ $15 = $3,000. Next 20 units @ $10 = $200. Total LIFO COGS = $3,200. LIFO COGS ($3,200) > FIFO COGS ($2,800) in a rising price environment — consistent with LIFO producing higher COGS. The difference ($400) represents the change in LIFO reserve for the period.'},
    {q:'A company using LIFO has a LIFO reserve of $60M. Its reported inventory is $140M, net income is $50M, and tax rate is 25%. Adjusted FIFO inventory and FIFO net income are:',choices:['A) FIFO inventory $200M; FIFO net income $95M','B) FIFO inventory $200M; FIFO net income $95M','C) FIFO inventory $80M; FIFO net income $5M','D) FIFO inventory $200M; FIFO net income $50M'],correct:'A',expl:'FIFO inventory = LIFO inventory + LIFO reserve = $140M + $60M = $200M. The LIFO reserve represents cumulative higher COGS under LIFO — reversing it increases pre-tax income by $60M. But only the CURRENT YEAR change in LIFO reserve adjusts current year net income (not the full reserve). If the reserve increased by, say, $8M this year, FIFO net income = $50M + $8M × (1-0.25) = $56M. The full reserve adjustment goes to equity.'},
    {q:'A LIFO company\'s inventory decreased from 10,000 units to 7,000 units during the year. The LIFO layers include: 5,000 units @ $8 (oldest) and 5,000 units @ $12. Current cost is $15/unit. What is the LIFO liquidation effect on gross profit?',choices:['A) Gross profit is artificially inflated because old $8 costs flow into COGS instead of current $15 costs','B) Gross profit is reduced by the liquidation','C) No effect — LIFO liquidation is a balance sheet event only','D) Gross profit increases by $21,000'],correct:'A',expl:'LIFO liquidation occurs when quantities fall below the beginning level. The 3,000 units sold from old layers cost $8 (vs. current $15). COGS is understated by $7/unit × 3,000 = $21,000, artificially boosting gross profit by $21,000. Companies must disclose this in footnotes. Analysts should normalize for LIFO liquidation effects when analyzing margin trends.'},
    {q:'Under IFRS, which inventory cost method is NOT permitted?',choices:['A) LIFO (last-in, first-out)','B) FIFO (first-in, first-out)','C) Weighted average cost','D) Specific identification for interchangeable items'],correct:'A',expl:'IAS 2 explicitly prohibits LIFO. IFRS permits FIFO, weighted average cost, and specific identification (for items that are not ordinarily interchangeable). This is one of the most tested GAAP/IFRS differences. The prohibition exists because LIFO balance sheet values can become severely outdated and misleading over time, violating IAS 2\'s requirement for faithful representation.'},
    {q:'Net Realizable Value (NRV) for LCNRV purposes equals:',choices:['A) Estimated selling price minus estimated costs to complete and costs necessary to make the sale','B) Replacement cost','C) Historical cost minus accumulated amortization','D) Fair value as determined by an independent appraiser'],correct:'A',expl:'NRV = Selling price - Completion costs - Selling costs. This is the GAAP/IFRS definition for inventory write-down purposes. Compare carrying cost to NRV: if cost > NRV, write down to NRV. Note: for raw materials, NRV is determined based on finished goods NRV. GAAP uses NRV (not replacement cost) since 2017 ASU update aligning with IFRS.'},
    {q:'Inventory was written down by $30M in the prior year under US GAAP. Conditions improve and the inventory\'s NRV recovers by $20M. Under GAAP, the write-down reversal is:',choices:['A) Not permitted — GAAP prohibits reversals of inventory write-downs','B) Recognized as a $20M gain in the income statement','C) Recognized in OCI to avoid income statement volatility','D) Recognized only if the inventory is sold in the current period'],correct:'A',expl:'ASC 330 prohibits reversal of inventory write-downs — the written-down value becomes the new cost basis. IFRS (IAS 2) permits reversal up to the original cost when NRV recovers, recognized in the income statement. This asymmetry means IFRS companies can show recovery gains that GAAP companies cannot — another comparability issue.'},
    {q:'A company purchases 500 units for $20 each in January and 300 units for $25 each in March. In April, 600 units are sold. Using weighted average cost, COGS is:',choices:['A) $13,125','B) $12,000','C) $13,500','D) $15,000'],correct:'A',expl:'Weighted average cost = Total cost / Total units = (500×$20 + 300×$25) / 800 = ($10,000 + $7,500) / 800 = $17,500/800 = $21.875/unit. COGS = 600 × $21.875 = $13,125. Weighted average smooths out price fluctuations, producing COGS and inventory values between FIFO and LIFO in rising price environments.'},
    {q:'Which inventory method results in a balance sheet inventory value closest to current replacement cost?',choices:['A) FIFO — because the most recently purchased inventory remains on the balance sheet','B) LIFO — because recent purchases are expensed to COGS','C) Weighted average — always closest to current cost','D) Specific identification — regardless of purchase timing'],correct:'A',expl:'FIFO ending inventory consists of the most recently purchased units — these cost figures are closest to current market prices. LIFO ending inventory reflects the oldest layers (potentially decades old for stable-volume companies) — severely understated relative to replacement cost. This is why analysts add the LIFO reserve when comparing LIFO companies\' balance sheets to FIFO/IFRS peers.'},
    {q:'Which of the following best describes the tax advantage of LIFO in a rising price environment?',choices:['A) Higher COGS reduces taxable income and taxes paid, improving cash flow even though reported net income is lower','B) LIFO eliminates inventory taxes entirely','C) LIFO defers taxes into future periods when prices are expected to be lower','D) LIFO is not permitted for tax purposes in the US'],correct:'A',expl:'In rising prices, LIFO COGS > FIFO COGS → lower taxable income → lower taxes NOW → better current cash flow. The LIFO conformity rule requires companies using LIFO for tax purposes to also use LIFO for financial reporting (cannot cherry-pick). The tax savings are real and permanent as long as inventory levels don\'t fall (LIFO liquidation) — a key reason US companies chose LIFO before IFRS convergence discussions.'},
    {q:'A company has inventory on its books at $500,000. The estimated selling price is $480,000 and estimated completion and selling costs are $30,000. The inventory should be reported at:',choices:['A) $450,000 — NRV of $450K is below cost of $500K requiring write-down','B) $480,000 — estimated selling price','C) $500,000 — historical cost is used unless impaired','D) $470,000 — average of cost and NRV'],correct:'A',expl:'NRV = Selling price - Completion/selling costs = $480,000 - $30,000 = $450,000. Cost of $500,000 > NRV of $450,000 → write down to $450,000. Record a $50,000 loss (typically in COGS or as a separate line). Under GAAP, this new $450,000 becomes the permanent cost basis — no reversal permitted even if prices recover.'},
    {q:'The LIFO conformity rule in the US requires that:',choices:['A) A company using LIFO for income tax purposes must also use LIFO for financial reporting','B) LIFO must be applied consistently to all inventory categories','C) LIFO companies must disclose the FIFO equivalent inventory value','D) LIFO can only be used for companies with more than $10M in inventory'],correct:'A',expl:'The LIFO conformity rule (IRC Section 472) mandates that if a company uses LIFO for tax purposes (to get the tax benefit), it must also use LIFO for its primary financial statements. It can show FIFO in supplemental disclosures. This rule explains why US companies that adopted LIFO historically for tax savings couldn\'t easily switch to FIFO for better-looking financial statements.'},
    {q:'Goods in transit FOB shipping point belong to:',choices:['A) The buyer — title passes when goods leave the seller\'s dock; buyer includes in inventory','B) The seller — until received by the buyer','C) The shipping company during transit','D) Whoever paid the freight costs'],correct:'A',expl:'FOB (Free On Board) Shipping Point: title and risk transfer at the point of shipment (seller\'s dock). Buyer owns goods in transit — must include in buyer\'s inventory. FOB Destination: title transfers at delivery — seller owns until received. This distinction determines which company records the inventory and the sale at period-end. Exam frequently tests this in year-end cutoff scenarios.'},
    {q:'Which inventory method is prohibited under IFRS?',choices:['A) LIFO','B) FIFO','C) Weighted average','D) Retail inventory method'],correct:'A',expl:'IAS 2 explicitly prohibits LIFO. FIFO and weighted average are permitted. The retail method is permitted as an approximation under both GAAP and IFRS. Specific identification is permitted for items not ordinarily interchangeable. This is one of the most frequently tested GAAP/IFRS differences — expect at least one question on this in FAR.'},
    {q:'A company\'s ending inventory under LIFO is $200M. The LIFO reserve is $45M and increased by $8M during the year. To convert to FIFO for comparison with an IFRS peer, the analyst should:',choices:['A) Add $45M to inventory and reduce COGS by $8M (current year reserve increase) to compute FIFO COGS','B) Add $8M to inventory and reduce COGS by $45M','C) Add $45M to inventory with no income statement adjustment','D) Subtract $45M from inventory to get to FIFO'],correct:'A',expl:'FIFO inventory = LIFO inventory + LIFO reserve = $200M + $45M = $245M. FIFO COGS = LIFO COGS - change in LIFO reserve = LIFO COGS - $8M (because the reserve increase represents additional COGS under LIFO that wouldn\'t exist under FIFO). Also increase equity by $45M × (1-tax rate) for the full cumulative reserve. The $8M current year change flows through the income statement adjustment.'},
  ],
  flashcards:[
    {front:'LIFO vs FIFO in rising prices (effects)',back:'LIFO: higher COGS, lower NI, lower taxes (cash benefit), lower B/S inventory. FIFO: lower COGS, higher NI, higher taxes, higher B/S inventory (closer to current cost). LIFO PROHIBITED under IFRS.'},
    {front:'LIFO Reserve — how to use it',back:'FIFO inventory = LIFO inventory + LIFO reserve. FIFO COGS = LIFO COGS - change in LIFO reserve. Equity adjustment = LIFO reserve × (1 - tax rate). Always check LIFO liquidations in footnotes.'},
    {front:'LCNRV write-downs: GAAP vs IFRS',back:'GAAP (ASC 330): write down to NRV; NO reversal permitted. IFRS (IAS 2): write down to NRV; REVERSAL permitted up to original cost when NRV recovers. Both use NRV (not replacement cost) as the comparison value.'},
  ],
},

{
  id:'cpa_far_03', exam:'CPA FAR', section:'Financial Accounting & Reporting',
  title:'Long-Lived Assets — Acquisition, Depreciation and Impairment',
  narrative:[
    'Long-lived tangible assets (PP&E) represent one of the largest items on most manufacturers\' and capital-intensive companies\' balance sheets. Initial measurement includes all costs necessary to bring the asset to its intended location and condition: purchase price, import duties, non-refundable taxes, installation, testing, and site preparation. Costs incurred after the asset is ready for use — repairs, maintenance, minor improvements — are generally expensed as incurred. Only improvements that extend useful life, increase capacity, or improve quality are capitalized. The distinction between capital expenditures and repairs is heavily tested and involves significant judgment.',
    'Depreciation allocates an asset\'s depreciable cost (historical cost minus salvage value) over its useful life — it is a process of cost allocation, not valuation. Straight-line method (SL): equal charge each period = (Cost - Salvage) / Useful Life. Double-declining balance (DDB): accelerated method applying 2/Useful Life to the declining book value each period — ignores salvage value in calculation but stops when book value reaches salvage. Sum-of-years-digits (SYD): also accelerated, using decreasing fractions of the depreciable base. Units-of-production: ties depreciation to actual usage, ideal when output varies significantly.',

// SPACED REPETITION ENGINE
// ══════════════════════════════════════════════════════════════════════════
// Simple SM-2 inspired: each item has interval (days), ease factor, next due date
const SRS_DEFAULTS = { interval:1, ease:2.5, due:0, reps:0 };

const srsUpdate = (item, grade) => {
  // grade: 0=missed, 1=hard, 2=got it
  let { interval, ease, reps } = { ...SRS_DEFAULTS, ...item };
  if (grade === 0) { interval = 1; reps = 0; ease = Math.max(1.3, ease - 0.2); }
  else if (grade === 1) { interval = Math.max(1, Math.round(interval * 1.2)); ease = Math.max(1.3, ease - 0.15); reps++; }
  else { interval = reps === 0 ? 1 : reps === 1 ? 3 : Math.round(interval * ease); ease += 0.1; reps++; }
  const due = Date.now() + interval * 86400000;
  return { interval, ease, reps, due };
};

const isDue = (srsData) => !srsData || !srsData.due || Date.now() >= srsData.due;

let sbClient = null;
const getSB = () => {
  if (sbClient) return sbClient;
  const url = localStorage.getItem('sb_url');
  const key = localStorage.getItem('sb_anon');
  if (url && key) { sbClient = supabase.createClient(url, key); return sbClient; }
  return null;
};

const saveProgress = async (userId, progressData) => {
  saveLocal(userId, progressData); // always save locally as backup
  const sb = getSB();
  if (!sb || !userId) return;
  try {
    await sb.from('progress').upsert({ user_id: userId, data: progressData, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
  } catch {}
};

const loadProgress = async (userId) => {
  const sb = getSB();
  if (sb && userId) {
    try {
      const { data } = await sb.from('progress').select('data').eq('user_id', userId).single();
      if (data?.data) return data.data;
    } catch {}
  }
  return loadLocal(userId);
};

function App() {

  const toastRef              = useRef(null);

  // Supabase auth listener
  useEffect(() => {
    const sb = getSB();
    if (!sb) return;
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) setUser({ id: session.user.id, name: session.user.user_metadata?.full_name || session.user.email, email: session.user.email });
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      if (session?.user) setUser({ id: session.user.id, name: session.user.user_metadata?.full_name || session.user.email, email: session.user.email });
      else setUser(null);
    });
    return () => subscription.unsubscribe();
  }, []);

  // Load progress when user logs in
  useEffect(() => {
    if (user?.id) {
      setLoading(true);
      loadProgress(user.id).then(p => { setProgress(p || {}); setLoading(false); });
    }

  const flash = (msg) => { setToast(msg); clearTimeout(toastRef.current); toastRef.current = setTimeout(() => setToast(null), 2400); };

  const persist = (newProgress) => {
    setProgress(newProgress);
    if (user?.id) saveProgress(user.id, newProgress);
  };

  // ── Pick next lesson (due for review or unseen) ────────────────────────
  const pickLesson = (examFilter) => {
    const pool = examFilter ? CONTENT.filter(c => c.exam === examFilter) : CONTENT;
    // First: unseen lessons
    const unseen = pool.filter(c => !progress[c.id]);
    if (unseen.length > 0) return unseen[0];
    // Then: lessons with weak quiz scores
    const weak = [...pool].sort((a, b) => {
      const pa = progress[a.id] || {}; const pb = progress[b.id] || {};
      const ra = pa.correct / Math.max(1, pa.correct + pa.wrong);
      const rb = pb.correct / Math.max(1, pb.correct + pb.wrong);
      return ra - rb;
    });
    return weak[0];
  };

  // ── Build anki deck from due flashcards ────────────────────────────────
  const buildAnkiDeck = (currentLesson) => {
    const deck = [];
    // Add current lesson's flashcards first (always due for new lesson)
    if (currentLesson?.flashcards) {
      currentLesson.flashcards.forEach((fc, i) => deck.push({ ...fc, lessonId: currentLesson.id, fcIdx: i, isNew: true }));
    }
    // Add due flashcards from other learned lessons
    CONTENT.forEach(lesson => {
      if (lesson.id === currentLesson?.id) return;
      if (!progress[lesson.id]) return;
      lesson.flashcards?.forEach((fc, i) => {
        const srsData = progress[lesson.id]?.srs?.[`fc_${i}`];
        if (isDue(srsData) && deck.length < 8) {
          deck.push({ ...fc, lessonId: lesson.id, fcIdx: i, isNew: false });
        }
      });
    });
    return deck;
  };

  // ── Start a lesson ─────────────────────────────────────────────────────
  const startLesson = (lesson) => {
    setActiveLesson(lesson);
    setPhase('lesson');
    setQIdx(0);
    setSel(null);
    setPage('study');
  };

  // ── Score a quiz answer ────────────────────────────────────────────────
  const scoreAnswer = (letter) => {
    setSel(letter);
    const correct = letter === activeLesson.questions[qIdx].correct;
    const np = { ...progress };
    if (!np[activeLesson.id]) np[activeLesson.id] = { correct: 0, wrong: 0, srs: {} };
    if (correct) np[activeLesson.id].correct++; else np[activeLesson.id].wrong++;
    persist(np);
    flash(correct ? '✓ Correct!' : 'Study this one again');
  };

  // ── Next question or go to anki ────────────────────────────────────────
  const nextQ = () => {
    if (qIdx < activeLesson.questions.length - 1) { setQIdx(i => i + 1); setSel(null); }
    else {
      const deck = buildAnkiDeck(activeLesson);
      setAnkiDeck(deck); setAnkiIdx(0); setAnkiFlip(false); setPhase('anki');
    }
  };

  // ── Score anki card ────────────────────────────────────────────────────
  const scoreAnki = (grade) => {
    const card = ankiDeck[ankiIdx];
    const np = { ...progress };
    if (!np[card.lessonId]) np[card.lessonId] = { correct: 0, wrong: 0, srs: {} };
    if (!np[card.lessonId].srs) np[card.lessonId].srs = {};
    const fcKey = `fc_${card.fcIdx}`;
    np[card.lessonId].srs[fcKey] = srsUpdate(np[card.lessonId].srs[fcKey], grade);
    persist(np);
    if (ankiIdx < ankiDeck.length - 1) { setAnkiIdx(i => i + 1); setAnkiFlip(false); }
    else { setPage('home'); flash('Session complete! Great work.'); }
  };

  // ── Stats ──────────────────────────────────────────────────────────────
  const totC = Object.values(progress).reduce((a, p) => a + (p.correct || 0), 0);
  const totW = Object.values(progress).reduce((a, p) => a + (p.wrong || 0), 0);
  const acc  = totC + totW ? Math.round(totC / (totC + totW) * 100) : null;
  const seenCount = Object.keys(progress).length;

  // ══════════════════════════════════════════════════════════════════════
  // AUTH SCREENS
  // ══════════════════════════════════════════════════════════════════════
  // Auth mode toggle
  const [authMode, setAuthMode] = useState('login'); // login|signup|setup

  if (!user) return (

        <div className="ttl" style={{ fontSize:28 }}>Study</div>
        <div className="sub" style={{ fontSize:13, marginTop:4 }}>CFA · CPA · IFRS Mastery</div>
      </div>

      {authMode === 'setup' ? (
        <div>
          <div className="bar"><button className="backbtn" onClick={() => setAuthMode('login')}>← Back</button><span className="barlabel">Supabase Setup</span></div>
          <div style={{ fontSize:13, color:'#888', fontFamily:'sans-serif', lineHeight:1.7, marginBottom:16 }}>
            Enter your Supabase credentials to save progress across devices.<br/>
            Don't have Supabase yet?{' '}
            <a href="https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME#readme"
               target="_blank"
               style={{ color:'#C1440E', textDecoration:'none' }}>
              Follow the 10-minute setup guide →
            </a>
          </div>
          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:11, color:'#666', fontFamily:'sans-serif', marginBottom:4 }}>Project URL</div>
            <input id="sb_url_input" className="authinput" placeholder="https://xxxx.supabase.co" defaultValue={localStorage.getItem('sb_url')||''} />
          </div>
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:11, color:'#666', fontFamily:'sans-serif', marginBottom:4 }}>Publishable / Anon Key</div>
            <input id="sb_anon_input" className="authinput" placeholder="sb_publishable_... or eyJ..." defaultValue={localStorage.getItem('sb_anon')||''} />
          </div>
          <button className="btn" onClick={() => {
            const url = document.getElementById('sb_url_input').value.trim();
            const key = document.getElementById('sb_anon_input').value.trim();
            if (!url || !key) { flash('Both fields required'); return; }
            localStorage.setItem('sb_url', url);
            localStorage.setItem('sb_anon', key);

          }}>Save & Continue</button>
          <button className="btn sec" style={{ marginTop:10 }} onClick={() => setAuthMode('login')}>Skip — Local Only</button>
        </div>

      ) : authMode === 'signup' ? (

          <div className="bar"><button className="backbtn" onClick={() => setAuthMode('login')}>← Back</button><span className="barlabel">Create Account</span></div>
          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:11, color:'#666', fontFamily:'sans-serif', marginBottom:4 }}>Your Name</div>
            <input id="su_name" className="authinput" placeholder="Full name" />
          </div>
          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:11, color:'#666', fontFamily:'sans-serif', marginBottom:4 }}>Email</div>
            <input id="su_email" className="authinput" type="email" placeholder="you@email.com" />
          </div>
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:11, color:'#666', fontFamily:'sans-serif', marginBottom:4 }}>Password</div>
            <input id="su_pass" className="authinput" type="password" placeholder="Min 6 characters" />
          </div>
          <button className="btn" onClick={async () => {
            const name  = document.getElementById('su_name').value.trim();
            const email = document.getElementById('su_email').value.trim();
            const pass  = document.getElementById('su_pass').value.trim();
            if (!name || !email || !pass) { flash('All fields required'); return; }
            if (pass.length < 6) { flash('Password must be 6+ characters'); return; }
            const sb = getSB();
            if (sb) {
              const { data, error } = await sb.auth.signUp({ email, password: pass, options:{ data:{ full_name: name } } });
              if (error) { flash('Error: ' + error.message); return; }
              if (data.user) { setUser({ id: data.user.id, name, email }); flash('Account created!'); return; }
            }
            // Fallback local
            const uid = email.replace(/[^a-z0-9]/gi,'_').toLowerCase();
            localStorage.setItem('study_local_user', JSON.stringify({ id: uid, name, email }));
            setUser({ id: uid, name, email });
          }}>Create Account</button>
          <div style={{ textAlign:'center', marginTop:14, fontSize:13, color:'#666', fontFamily:'sans-serif' }}>
            Already have an account?{' '}
            <span style={{ color:'#C1440E', cursor:'pointer' }} onClick={() => setAuthMode('login')}>Sign in</span>
          </div>
        </div>

      ) : (
        <div>
          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:11, color:'#666', fontFamily:'sans-serif', marginBottom:4 }}>Email</div>
            <input id="li_email" className="authinput" type="email" placeholder="you@email.com" />
          </div>
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:11, color:'#666', fontFamily:'sans-serif', marginBottom:4 }}>Password</div>
            <input id="li_pass" className="authinput" type="password" placeholder="Your password" />
          </div>
          <button className="btn" onClick={async () => {
            const email = document.getElementById('li_email').value.trim();
            const pass  = document.getElementById('li_pass').value.trim();
            if (!email || !pass) { flash('Email and password required'); return; }
            const sb = getSB();
            if (sb) {
              const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
              if (error) { flash('Error: ' + error.message); return; }
              if (data.user) {
                const name = data.user.user_metadata?.full_name || email.split('@')[0];
                setUser({ id: data.user.id, name, email });
                return;
              }
            }
            // Fallback local
            const saved = localStorage.getItem('study_local_user');
            if (saved) { setUser(JSON.parse(saved)); return; }
            flash('No account found — please sign up first');
          }}>Sign In</button>

          <div style={{ textAlign:'center', margin:'14px 0', color:'#333', fontSize:12, fontFamily:'sans-serif' }}>— no account yet? —</div>
          <button className="btn sec" onClick={() => setAuthMode('signup')}>Create Account →</button>
          <button className="btn sec" style={{ marginTop:10 }} onClick={() => setAuthMode('setup')}>⚙️ Setup Cloud Save (Supabase)</button>
          <div style={{ fontSize:11, color:'#555', fontFamily:'sans-serif', textAlign:'center', marginTop:14, lineHeight:1.9 }}>
            Cloud save requires your own free Supabase account.<br/>
            <a href="https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME#readme"
               target="_blank"
               style={{ color:'#C1440E', textDecoration:'none' }}>
              📖 Read the setup guide →
            </a><br/>
            Without it, progress saves locally on this device only.
          </div>
        </div>
      )}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════
  // HOME
  // ══════════════════════════════════════════════════════════════════════
  if (page === 'home') return (
    <div id="app">
      <div className="hdr">
        <div className="ava">📚</div>
        <div style={{ flex:1 }}>
          <div className="ttl">Study</div>
          <div className="sub">Welcome, {user.name.split('_').join(' ')}</div>
        </div>
        <button onClick={() => setUser(null)} style={{ background:'none', border:'none', color:'#444', fontSize:12, fontFamily:'sans-serif' }}>Sign out</button>
      </div>

      <div className="pills">
        <div className="pill"><div className="pill-v">{seenCount}</div><div className="pill-l">Studied</div></div>
        <div className="pill"><div className="pill-v">{CONTENT.length}</div><div className="pill-l">Total</div></div>
        <div className="pill"><div className="pill-v">{totC}</div><div className="pill-l">Correct</div></div>
        {acc !== null && <div className="pill"><div className="pill-v">{acc}%</div><div className="pill-l">Accuracy</div></div>}
      </div>

      <button className="btn" onClick={() => startLesson(pickLesson(null))}>▶  Start Next Lesson</button>
      {seenCount > 0 && <button className="btn sec" style={{ marginTop:10 }} onClick={() => setPage('review')}>🃏  Anki Review — Due Cards</button>}
      <button className="btn sec" style={{ marginTop:10 }} onClick={() => setPage('topics')}>📋  Browse All Topics</button>
      <button className="btn sec" style={{ marginTop:10 }} onClick={() => setPage('progress')}>📊  My Progress</button>

      {/* Quick exam buttons */}
      <div className="seclabel">Jump to exam section</div>
      {['CFA L1','CPA FAR'].map(exam => {
        const lessons = CONTENT.filter(c => c.exam === exam);
        const done = lessons.filter(c => progress[c.id]).length;
        return (
          <button key={exam} className="examrow" onClick={() => startLesson(pickLesson(exam))} style={{ borderColor: EXAM_COLOR[exam]+'55' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ color:EXAM_COLOR[exam], fontWeight:'bold', fontSize:15 }}>{exam}</span>
              <span style={{ fontSize:11, color:'#666', fontFamily:'sans-serif' }}>{done}/{lessons.length} lessons</span>
            </div>
            <div className="pbar"><div className="pfill" style={{ width:`${lessons.length?done/lessons.length*100:0}%`, background:EXAM_COLOR[exam]+'BB' }}/></div>
          </button>
        );
      })}
      <div style={{ fontSize:11, color:'#333', fontFamily:'sans-serif', textAlign:'center', marginTop:16, lineHeight:1.7 }}>
        More exam sections (CFA L2/L3, CPA AUD/REG/BEC, IFRS) coming soon
      </div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════
  // TOPICS
  // ══════════════════════════════════════════════════════════════════════
  if (page === 'topics') return (
    <div id="app">
      <div className="bar"><button className="backbtn" onClick={() => setPage('home')}>← Back</button><span className="barlabel">All Topics</span></div>
      {CONTENT.map(lesson => {
        const p = progress[lesson.id];
        const tot = (p?.correct||0) + (p?.wrong||0);
        const pct = tot ? Math.round(p.correct/tot*100) : null;
        return (
          <div key={lesson.id} className="topicrow" onClick={() => startLesson(lesson)}>
            <span style={{ fontSize:16, marginRight:4 }}>{p ? '✓' : '○'}</span>
            <div style={{ flex:1 }}>
              <div className="topic-name">{lesson.title}</div>
              <div style={{ fontSize:10, color:EXAM_COLOR[lesson.exam]||'#888', fontFamily:'sans-serif', marginTop:2 }}>{lesson.exam} · {lesson.section}</div>
            </div>
            {pct !== null && <span className="topic-score">{pct}%</span>}
            <span style={{ fontSize:11, color:EXAM_COLOR[lesson.exam], fontFamily:'sans-serif', marginLeft:8 }}>→</span>
          </div>
        );
      })}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════
  // PROGRESS
  // ══════════════════════════════════════════════════════════════════════
  if (page === 'progress') return (
    <div id="app">
      <div className="bar"><button className="backbtn" onClick={() => setPage('home')}>← Back</button><span className="barlabel">Progress</span></div>
      <div className="pills">
        <div className="pill"><div className="pill-v">{seenCount}</div><div className="pill-l">Studied</div></div>
        <div className="pill"><div className="pill-v">{totC}</div><div className="pill-l">Correct</div></div>
        <div className="pill"><div className="pill-v">{totW}</div><div className="pill-l">Wrong</div></div>
        {acc !== null && <div className="pill"><div className="pill-v">{acc}%</div><div className="pill-l">Accuracy</div></div>}
      </div>
      {CONTENT.map(lesson => {
        const p = progress[lesson.id];
        if (!p) return null;
        const tot = (p.correct||0)+(p.wrong||0);
        const pct = tot ? Math.round(p.correct/tot*100) : 0;
        return (
          <div key={lesson.id} style={{ borderBottom:'1px solid #1e1e1e', padding:'10px 0', display:'flex', alignItems:'center', gap:10 }}>
            <span style={{ fontSize:10, borderRadius:20, padding:'2px 8px', fontFamily:'sans-serif', background:EXAM_COLOR[lesson.exam]+'22', color:EXAM_COLOR[lesson.exam], flexShrink:0 }}>{lesson.exam}</span>
            <span style={{ flex:1, fontSize:12, color:'#ccc' }}>{lesson.title}</span>
            <span style={{ fontSize:12, color: pct>=80?'#7eca7e':pct>=60?'#CCAA55':'#f08060', fontFamily:'sans-serif', flexShrink:0 }}>{pct}%</span>
          </div>
        );
      })}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════
  // STANDALONE ANKI REVIEW
  // ══════════════════════════════════════════════════════════════════════
  if (page === 'review') {
    const dueCards = [];
    CONTENT.forEach(lesson => {
      if (!progress[lesson.id]) return;
      lesson.flashcards?.forEach((fc, i) => {
        const srsData = progress[lesson.id]?.srs?.[`fc_${i}`];
        if (isDue(srsData)) dueCards.push({ ...fc, lessonId: lesson.id, fcIdx: i });
      });
    });
    if (dueCards.length === 0) return (
      <div id="app">
        <div className="bar"><button className="backbtn" onClick={() => setPage('home')}>← Back</button><span className="barlabel">Anki Review</span></div>
        <div style={{ textAlign:'center', padding:'60px 20px', color:'#666', fontFamily:'sans-serif' }}>
          🎉 All caught up! No cards due for review.<br/><br/>
          <span style={{ fontSize:12 }}>Come back tomorrow for your next review session.</span>
        </div>
      </div>
    );
    return (
      <div id="app">
        <div className="bar"><button className="backbtn" onClick={() => setPage('home')}>← Home</button><span className="barlabel">Anki Review — {dueCards.length} due</span></div>
        {(() => {
          const card = dueCards[ankiIdx % dueCards.length];
          return (
            <div className="fade">
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                <span style={{ fontSize:12, color:'#888', fontFamily:'sans-serif' }}>Card {(ankiIdx % dueCards.length)+1} of {dueCards.length}</span>
              </div>
              <div className="ankicard" onClick={() => setAnkiFlip(f => !f)}>
                <div className="anki-label">{ankiFlip ? 'ANSWER' : 'QUESTION — tap to flip'}</div>
                <div className="anki-text">{ankiFlip ? card.back : card.front}</div>
              </div>
              {ankiFlip && (
                <div className="ankibtns fade">
                  <button className="abtn-miss" onClick={() => scoreAnki(0)}>😕 Missed</button>
                  <button className="abtn-hard" onClick={() => scoreAnki(1)}>🤔 Hard</button>
                  <button className="abtn-got"  onClick={() => scoreAnki(2)}>✅ Got it</button>
                </div>
              )}
            </div>
          );
        })()}
        {toast && <div className="toast">{toast}</div>}
      </div>
    );
  }

  // ══════════════════════════════════════════════════════════════════════
  // STUDY — LESSON / QUIZ / ANKI
  // ══════════════════════════════════════════════════════════════════════
  if (page === 'study' && activeLesson) return (
    <div id="app">
      <div className="bar">
        <button className="backbtn" onClick={() => setPage('home')}>← Home</button>
        <span className="barlabel">{activeLesson.exam}</span>
        <span style={{ fontSize:10, color:'#555', fontFamily:'sans-serif' }}>{phase === 'lesson' ? 'Lesson' : phase === 'quiz' ? `Q${qIdx+1}/${activeLesson.questions.length}` : `Anki ${ankiIdx+1}/${ankiDeck.length}`}</span>
      </div>

      {/* ── LESSON ── */}
      {phase === 'lesson' && (
        <div className="fade">
          <span className="badge" style={{ background:EXAM_COLOR[activeLesson.exam]+'22', color:EXAM_COLOR[activeLesson.exam] }}>{activeLesson.exam}</span>
          <div style={{ fontSize:11, color:'#555', fontFamily:'sans-serif', marginBottom:10 }}>{activeLesson.section}</div>
          <div className="ltitle">{activeLesson.title}</div>

          {activeLesson.narrative.map((p, i) => <p key={i} className="para">{p}</p>)}

          {activeLesson.ifrsNote && (
            <div className="ifrs">
              <div className="ifrs-label">⚖ GAAP vs IFRS</div>
              <div className="ifrs-text">{activeLesson.ifrsNote}</div>
            </div>
          )}

          {activeLesson.mnemonic && (
            <div className="mnemonic">
              <div className="mnemonic-label">💡 Memory Tool</div>
              <div className="mnemonic-text">{activeLesson.mnemonic}</div>
            </div>
          )}

          {activeLesson.outline && (
            <div className="outline">
              {activeLesson.outline.map((item, i) => <div key={i} className="outline-item">• {item}</div>)}
            </div>
          )}

          <button className="btn" style={{ marginTop:20 }} onClick={() => { setPhase('quiz'); setSel(null); setQIdx(0); }}>
            Start Quiz ({activeLesson.questions.length} questions) →
          </button>
          <button className="btn sec" style={{ marginTop:10 }} onClick={() => setPage('home')}>← Back to Home</button>
        </div>
      )}

      {/* ── QUIZ ── */}
      {phase === 'quiz' && (
        <div className="fade">
          {/* Progress dots */}
          <div className="qprogress">
            {activeLesson.questions.map((_, i) => (
              <div key={i} className={`qprog-dot ${i < qIdx ? 'done' : i === qIdx ? 'current' : ''}`}/>
            ))}
          </div>

          <div className="qbox">
            <div className="qbox-label">{activeLesson.exam} · {activeLesson.section}</div>
            {activeLesson.questions[qIdx].q}
          </div>

          {activeLesson.questions[qIdx].choices.map((c, i) => {
            const letter = c[0];
            const isCor = letter === activeLesson.questions[qIdx].correct;
            const isSel = sel === letter;
            let cls = 'choice';
            if (sel) { if (isCor) cls += ' correct'; else if (isSel) cls += ' wrong'; else cls += ' neutral'; }
            return <button key={i} className={cls} onClick={() => { if (!sel) scoreAnswer(letter); }}>{c}</button>;
          })}

          {sel && (
            <div className="fade">
              <div className="expl" style={{ borderColor: sel === activeLesson.questions[qIdx].correct ? '#3a8a3a44' : '#C1440E44' }}>
                {activeLesson.questions[qIdx].expl}
              </div>
              <button className="btn" style={{ marginTop:14 }} onClick={nextQ}>
                {qIdx < activeLesson.questions.length - 1 ? `Next Question (${qIdx+2}/${activeLesson.questions.length}) →` : 'Flashcard Review →'}
              </button>
            </div>
          )}
        </div>
      )}

      {/* ── ANKI ── */}
      {phase === 'anki' && ankiDeck.length > 0 && (
        <div className="fade">
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <span style={{ fontSize:13, color:'#888', fontFamily:'sans-serif' }}>🃏 Memory Review — {ankiIdx+1} of {ankiDeck.length}</span>
            {ankiDeck[ankiIdx]?.isNew && <span style={{ fontSize:10, background:'#C1440E22', color:'#C1440E', borderRadius:20, padding:'2px 8px', fontFamily:'sans-serif' }}>NEW</span>}
          </div>

          <div className="ankicard" onClick={() => setAnkiFlip(f => !f)}>
            <div className="anki-label">{ankiFlip ? 'ANSWER' : 'QUESTION — tap to flip'}</div>
            <div className="anki-text">{ankiFlip ? ankiDeck[ankiIdx].back : ankiDeck[ankiIdx].front}</div>
          </div>

          {ankiFlip && (
            <div className="ankibtns fade">
              <button className="abtn-miss" onClick={() => scoreAnki(0)}>😕 Missed</button>
              <button className="abtn-hard" onClick={() => scoreAnki(1)}>🤔 Hard</button>
              <button className="abtn-got"  onClick={() => scoreAnki(2)}>✅ Got it</button>
            </div>
          )}

          <button className="btn sec" style={{ marginTop:4 }} onClick={() => { setPage('home'); flash('Lesson complete!'); }}>
            Finish Session →
          </button>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );

  return <div id="app"><div style={{ color:'#666', textAlign:'center', paddingTop:60, fontFamily:'sans-serif' }}>Loading…</div></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
