<style>

// ══════════════════════════════════════════════════════════════════════════
// CONTENT DATABASE
// Each lesson has: narrative paragraphs, GAAP/IFRS note, mnemonic (where applicable),
// key outline, 30 questions, and 3 Anki flashcards
// ══════════════════════════════════════════════════════════════════════════
const CONTENT = [

// ════════════════════════════════════════════════════════════════════════
// CFA L1 — FINANCIAL STATEMENT ANALYSIS
// ════════════════════════════════════════════════════════════════════════
{
  id:'cfa1_fsa_01', exam:'CFA L1', section:'Financial Statement Analysis',
  title:'The Income Statement — Structure and Analysis',
  narrative:[
    'The income statement reports revenues, expenses, gains, and losses over a specific accounting period, culminating in net income. The fundamental structure flows from revenue at the top through gross profit, operating income (EBIT), pre-tax income, and finally net income after taxes. Each transition reveals a different layer of profitability — gross margin reflects pricing power and production efficiency, while operating margin captures management\'s ability to control overhead.',
    'Revenue is recognized when control transfers to the customer under ASC 606 and IFRS 15 — not necessarily when cash is received. This creates accruals that can diverge significantly from cash. A company booking $10M in revenue this quarter may collect only $6M in cash if customers pay on 60-day terms. Analysts compare revenue growth to cash collected from customers (in the operating cash flow section) to detect aggressive recognition. A persistent gap — revenue growing faster than cash collected — is one of the strongest earnings quality warning signals.',
    'Below operating income, interest expense reflects financing costs and is separate from operating performance. Non-recurring items — restructuring charges, asset impairments, gains on asset sales — are disclosed separately because they distort trend analysis. Analysts build "normalized" income statements by stripping these out. A company reporting $100M operating income that includes a $30M restructuring charge has only $70M of recurring earning power — a critical distinction for valuation.',
    'Common-size income statements express each line as a percentage of revenue. This removes the distortion of absolute size and enables meaningful comparison across companies and periods. If Company A spends 12% of revenue on SG&A and its peer spends 18%, something structural differs — distribution model, sales force efficiency, or organizational bloat. The trend in gross margin is particularly important: compression of even 100 basis points in gross margin at a large company can represent hundreds of millions in lost profit.',
  ],
  ifrsNote:'Under IFRS (IAS 1), companies may present expenses by function (COGS, SG&A) or by nature (materials, labor, depreciation) — GAAP requires function-based presentation for SEC filers. IFRS also allows more flexibility in classifying interest and dividends in the cash flow statement. IFRS prohibits the "extraordinary items" classification that GAAP eliminated in 2015 — both now require unusual items to be described in notes but included in continuing operations.',
  mnemonic:'GROPE — Gross profit, EBIT, Operating income, Pre-tax income, Earnings (net income) — the five key income statement subtotals in order.',
  outline:[
    'Revenue → Gross Profit (subtract COGS)',
    'Gross Profit → Operating Income/EBIT (subtract SG&A, D&A)',
    'EBIT → Pre-tax Income (subtract interest expense, add interest income)',
    'Pre-tax Income → Net Income (subtract income tax expense)',
    'Key margins: Gross%, Operating%, Net% — all as % of revenue',
    'Non-recurring items: restructuring, impairment, gains/losses on asset sales',
    'Common-size analysis: express every line as % of revenue',
  ],
  questions:[
    {q:'A company reports revenue of $800M, COGS of $480M, SG&A of $120M, interest expense of $30M, and a tax rate of 25%. What is net income?',choices:['A) $127.5M','B) $170M','C) $150M','D) $142.5M'],correct:'A',expl:'Gross profit = $320M. EBIT = $320M - $120M = $200M. Pre-tax income = $200M - $30M = $170M. Net income = $170M × (1-0.25) = $127.5M. Common trap: forgetting to subtract interest before applying the tax rate.'},
    {q:'An analyst notices that a company\'s revenue grew 15% while cash collected from customers grew only 4%. This most likely indicates:',choices:['A) Aggressive revenue recognition or deteriorating receivables quality','B) Strong operating leverage','C) Improved working capital management','D) Higher profit margins'],correct:'A',expl:'When revenue grows much faster than cash collected, receivables are building up faster than they are being collected. This suggests either aggressive revenue recognition (booking sales before cash is likely) or customers who are slow/unable to pay — both are earnings quality red flags.'},
    {q:'Company A reports operating income of $60M including a $15M restructuring charge and a $8M gain on sale of equipment. Normalized EBIT is:',choices:['A) $67M','B) $53M','C) $75M','D) $83M'],correct:'A',expl:'Add back the non-recurring restructuring charge ($15M) and remove the non-recurring gain (-$8M): $60M + $15M - $8M = $67M. Restructuring charges are added back (they reduced income); gains on asset sales are subtracted (they inflated income). Both are non-recurring.'},
    {q:'On a common-size income statement, Company A has gross margin of 55% and SG&A of 30% of revenue. Company B (same industry) has gross margin of 48% and SG&A of 20%. Which company has higher operating margin?',choices:['A) Company A at 25%','B) Company B at 28%','C) Both equal at 25%','D) Cannot determine without absolute numbers'],correct:'A',expl:'Operating margin = Gross margin - SG&A%. Company A: 55% - 30% = 25%. Company B: 48% - 20% = 28%. Company B has higher operating margin despite lower gross margin because it spends far less on SG&A. Common-size analysis reveals this; raw numbers would obscure it.'},
    {q:'Which of the following is most likely classified as a non-operating item on the income statement?',choices:['A) Depreciation of manufacturing equipment','B) Interest expense on long-term debt','C) Research and development costs','D) Warranty expense'],correct:'B',expl:'Interest expense is a financing cost — it results from capital structure decisions, not core operations. It appears below operating income. Depreciation, R&D, and warranty expense all relate to operating activities and appear above the operating income line.'},
    {q:'A retailer has revenue of $500M, COGS of $350M, and operating expenses of $80M. It also recorded a $20M impairment charge on goodwill. EBITDA (assuming $15M D&A already in operating expenses) is:',choices:['A) $85M','B) $70M','C) $65M','D) $50M'],correct:'A',expl:'EBIT = $500M - $350M - $80M - $20M = $50M. EBITDA adds back D&A ($15M) and often the non-cash impairment ($20M): $50M + $15M + $20M = $85M. Goodwill impairment is non-cash and non-recurring, so most analysts add it back to EBITDA for valuation purposes.'},
    {q:'The difference between basic EPS and diluted EPS is largest when:',choices:['A) A company has many dilutive securities outstanding such as convertible bonds and stock options','B) Net income is very high relative to share count','C) The company has no preferred dividends','D) Stock price is below the exercise price of options'],correct:'A',expl:'Diluted EPS includes the effect of all potentially dilutive securities. The more dilutive securities (convertible bonds, options, warrants) outstanding, the larger the gap between basic and diluted EPS. When stock price is below option exercise price, options are antidilutive and excluded — reducing the gap.'},
    {q:'Under the treasury stock method for diluted EPS, if 1M options are outstanding with an exercise price of $20 and the average market price is $25, the net increase in diluted shares is:',choices:['A) 200,000 shares','B) 1,000,000 shares','C) 800,000 shares','D) 250,000 shares'],correct:'A',expl:'Proceeds from exercise = 1M × $20 = $20M. Shares repurchased at market = $20M/$25 = 800,000. Net new shares = 1,000,000 - 800,000 = 200,000. The treasury stock method assumes proceeds are used to buy back shares at the average market price — only the net increase enters diluted share count.'},
    {q:'A company\'s gross margin declined from 42% to 38% over three years while its operating margin held steady at 15%. The most likely explanation is:',choices:['A) The company cut SG&A and other operating costs to offset gross margin pressure','B) Interest expense increased significantly','C) Tax rate declined','D) Revenue grew faster than COGS'],correct:'A',expl:'If gross margin fell 4 percentage points but operating margin held flat, operating expenses below the gross profit line must have decreased by 4 percentage points of revenue. This means SG&A or other operating costs were cut. This could reflect genuine efficiency or potentially underinvestment in the business.'},
    {q:'Which inventory costing method results in the lowest gross profit during a period of rising input costs?',choices:['A) LIFO','B) FIFO','C) Weighted average','D) Specific identification'],correct:'A',expl:'Under LIFO, the most recently purchased (most expensive) inventory is expensed first as COGS. In rising price environments, LIFO produces the highest COGS and therefore the lowest gross profit. FIFO produces the opposite — lowest COGS (oldest, cheapest inventory expensed first) and highest gross profit. Note: LIFO is prohibited under IFRS.'},
    {q:'An analyst is comparing two companies in the same industry. Company X uses LIFO and has a LIFO reserve of $40M. Company Y uses FIFO. To make the comparison meaningful, the analyst should:',choices:['A) Add $40M to Company X\'s inventory and reduce COGS by the change in LIFO reserve for the period','B) Subtract $40M from Company X\'s equity','C) Add $40M to Company Y\'s inventory','D) No adjustment is needed as both are acceptable GAAP methods'],correct:'A',expl:'Adding the LIFO reserve to inventory converts it to FIFO equivalent. The change in LIFO reserve for the current period must be subtracted from COGS to show what COGS would have been under FIFO. Also adjust equity upward by LIFO reserve × (1-tax rate) to reflect the after-tax impact on retained earnings.'},
    {q:'EPS from continuing operations is most useful because it:',choices:['A) Excludes discontinued operations and provides a better base for forecasting future earnings','B) Always exceeds diluted EPS','C) Reflects the impact of all capital structure decisions','D) Is required only under IFRS'],correct:'A',expl:'Continuing operations EPS excludes discontinued segments, allowing analysts to project future earnings without the distortion of businesses being sold or shut down. Discontinued operations are shown separately below continuing operations to maintain transparency while keeping forecast-relevant numbers clean.'},
    {q:'A company reports EBIT of $120M and interest expense of $20M. Its interest coverage ratio is 6x. If it issues $200M of additional debt at 5%, what is the new interest coverage ratio?',choices:['A) 4.0x','B) 3.0x','C) 4.8x','D) 5.0x'],correct:'A',expl:'New interest expense = $20M + ($200M × 5%) = $20M + $10M = $30M. New coverage = $120M/$30M = 4.0x. Coverage declined from 6x to 4x — still adequate but meaningfully weaker. Below 2x is considered distressed territory.'},
    {q:'Which of the following best describes operating leverage?',choices:['A) The sensitivity of operating income to changes in revenue, driven by the proportion of fixed costs','B) The use of debt to amplify returns to equity holders','C) The ratio of operating income to interest expense','D) The percentage of revenue retained after all operating expenses'],correct:'A',expl:'Operating leverage measures how a change in revenue flows through to operating income. High fixed costs (high operating leverage) mean a 10% revenue increase could produce a 30% increase in operating income — but a 10% revenue decline could wipe out most operating profit. It is NOT financial leverage (which involves debt).'},
    {q:'Comprehensive income differs from net income because it includes:',choices:['A) Other comprehensive income items such as unrealized gains on available-for-sale securities and foreign currency translation adjustments','B) Dividends paid to shareholders','C) All items that flow through the income statement','D) Only cash-based transactions'],correct:'A',expl:'Other comprehensive income (OCI) includes items that affect equity but bypass the income statement: unrealized gains/losses on AFS securities, foreign currency translation adjustments, pension actuarial gains/losses, and effective portion of cash flow hedges. These appear in equity as accumulated OCI (AOCI) until realized.'},
    {q:'A technology company capitalizes software development costs of $50M that a competitor expenses immediately. Assuming 5-year amortization and 25% tax rate, what is the after-tax earnings difference in year 1?',choices:['A) $30M higher for the capitalizing company','B) $7.5M higher for the capitalizing company','C) $30M lower for the capitalizing company','D) $37.5M higher for the capitalizing company'],correct:'A',expl:'The capitalizing company expenses only $50M/5 = $10M amortization vs. $50M for the expensing company. Pre-tax difference = $40M. After-tax = $40M × (1-0.25) = $30M higher earnings for the capitalizing company. However, this is an accounting choice — cash flows are identical. The capitalizing company has higher earnings quality risk.'},
    {q:'The accrual ratio is calculated as (Net Income - CFO) / Average Net Assets. A high positive accrual ratio suggests:',choices:['A) Earnings are being driven by accruals rather than cash flows, indicating potentially lower earnings quality','B) The company has strong cash conversion','C) Operating cash flows are growing faster than net income','D) The company is conservatively recognizing revenue'],correct:'A',expl:'A high accrual ratio means net income significantly exceeds operating cash flow — the gap is filled by accounting accruals (receivables, deferred revenue reversals, etc.). Academic research (Sloan 1996) showed high-accrual companies systematically underperform the market as accruals reverse. This is one of the most powerful earnings quality signals.'},
    {q:'Which of the following would cause operating cash flow to be LOWER than net income?',choices:['A) An increase in accounts receivable','B) An increase in accounts payable','C) Depreciation expense','D) A decrease in inventory'],correct:'A',expl:'An increase in accounts receivable means revenue was recognized but cash not yet collected — cash flow is lower than income. Increases in AP (more time to pay) and depreciation (non-cash expense added back) both increase CFO relative to net income. Decreasing inventory releases cash, also increasing CFO.'},
    {q:'A manufacturer reports revenue of $600M with DSO (days sales outstanding) of 45 days in year 1 and 72 days in year 2 (industry average: 40 days). This most likely indicates:',choices:['A) Deteriorating receivables quality or channel stuffing — revenue may be pulled forward from future periods','B) Improved collection efficiency','C) Customers are paying faster than before','D) Revenue recognition has become more conservative'],correct:'A',expl:'Rising DSO well above the industry average is a red flag. It suggests either customers are struggling to pay, the company is extending lenient credit to book sales (channel stuffing), or revenue is being recognized before it is truly earned. Analysts should check if revenue growth is matched by eventual cash collection.'},
    {q:'Under the indirect method of the cash flow statement, which of the following is added back to net income to compute CFO?',choices:['A) Depreciation and amortization expense','B) Gain on sale of equipment','C) Increase in accounts receivable','D) Decrease in accounts payable'],correct:'A',expl:'D&A is a non-cash expense deducted from net income — it must be added back. Gains on asset sales are non-operating and remove from CFO (they go in CFI). Increases in AR reduce CFO (cash not received). Decreases in AP reduce CFO (cash paid out faster than recognized).'},
    {q:'EBITDA is most useful as a valuation metric because:',choices:['A) It removes the effects of financing structure, accounting depreciation choices, and taxes enabling cross-company comparison','B) It perfectly represents cash available to equity holders','C) It is required to be disclosed under both GAAP and IFRS','D) It eliminates all non-cash charges including working capital changes'],correct:'A',expl:'EV/EBITDA is widely used precisely because EBITDA strips out interest (financing), taxes (jurisdiction), and D&A (accounting choice for asset lives) — making companies with different capital structures, tax rates, and depreciation policies more comparable. However, EBITDA overstates cash flow by ignoring capex and working capital needs.'},
    {q:'A company switches from straight-line to accelerated depreciation. In the first year, this change will:',choices:['A) Reduce net income and reduce total assets','B) Increase net income and increase total assets','C) Have no effect on net income but reduce total assets','D) Reduce operating cash flow'],correct:'A',expl:'Accelerated depreciation records higher depreciation expense in early years, reducing net income and the book value of assets (net PP&E). No effect on operating cash flow because depreciation is non-cash — it is added back in the indirect method. Over the asset\'s life, total depreciation is identical under both methods.'},
    {q:'Which ratio best measures a company\'s ability to generate profit from its assets regardless of financing structure?',choices:['A) Return on assets (ROA) using EBIT(1-t) as the numerator','B) Return on equity (ROE)','C) Gross margin','D) Net profit margin'],correct:'A',expl:'Using EBIT(1-t) — also called NOPAT — as the numerator removes the effect of interest expense (financing choice) from the return measure. This is essentially ROIC when divided by invested capital. ROE is affected by leverage. Gross margin and net profit margin are income statement ratios, not asset utilization measures.'},
    {q:'The DuPont decomposition expresses ROE as:',choices:['A) Net profit margin × Asset turnover × Equity multiplier','B) Gross margin × Operating efficiency × Financial leverage','C) EBIT margin × Tax burden × Asset base','D) Revenue growth × Margin expansion × Multiple expansion'],correct:'A',expl:'The classic three-factor DuPont: ROE = (Net Income/Revenue) × (Revenue/Assets) × (Assets/Equity). This decomposes ROE into profitability (margin), efficiency (turnover), and leverage (multiplier). High ROE driven primarily by high equity multiplier (leverage) is less sustainable and higher risk than ROE driven by margin and turnover.'},
    {q:'Company A: net margin 4%, asset turnover 2.5x, equity multiplier 3.0x. Company B: net margin 12%, asset turnover 1.2x, equity multiplier 1.5x. Which has higher ROE and which is higher quality?',choices:['A) A: ROE 30%, B: ROE 21.6% — but B is higher quality due to lower leverage dependence','B) A: ROE 30%, B: ROE 21.6% — A is higher quality','C) Both have equal ROE','D) B: ROE 30%, A: ROE 21.6%'],correct:'A',expl:'ROE A = 4% × 2.5 × 3.0 = 30%. ROE B = 12% × 1.2 × 1.5 = 21.6%. Company A has higher ROE but achieves it through 3x leverage — fragile in a downturn. Company B earns its ROE through strong margins with minimal leverage — more durable and valuable. Always decompose ROE before accepting it at face value.'},
    {q:'Which of the following is NOT a component of other comprehensive income (OCI)?',choices:['A) Gains and losses from discontinued operations','B) Foreign currency translation adjustments','C) Unrealized gains on available-for-sale debt securities','D) Pension actuarial gains and losses'],correct:'A',expl:'Discontinued operations flow through the income statement (below continuing operations line) and are included in net income — they do NOT bypass the income statement into OCI. The other three items (FX translation, AFS unrealized gains/losses, pension actuarial items) all go through OCI and accumulate in AOCI on the balance sheet.'},
    {q:'A company reports net income of $80M, D&A of $20M, increase in accounts receivable of $25M, increase in inventory of $10M, and increase in accounts payable of $15M. Operating cash flow is:',choices:['A) $80M','B) $95M','C) $70M','D) $60M'],correct:'A',expl:'CFO = Net income + D&A - ΔAR - ΔInventory + ΔAP = $80M + $20M - $25M - $10M + $15M = $80M. The working capital changes net to zero in this case. Note how D&A is added back (non-cash) and increases in operating assets reduce cash while increases in operating liabilities add cash.'},
    {q:'Free cash flow to equity (FCFE) is best described as:',choices:['A) CFO minus capex plus net borrowing — cash available to equity holders after debt service and reinvestment','B) EBITDA minus taxes minus capex','C) Net income plus depreciation','D) Operating cash flow minus all capital expenditures and debt repayments'],correct:'A',expl:'FCFE = CFO - Capex + Net borrowing (new debt issued minus repaid). This represents cash genuinely available to pay dividends or buy back shares. FCFF (to the firm) = CFO - Capex (before debt service). The difference is that FCFE accounts for net debt cash flows while FCFF does not.'},
    {q:'A company\'s cash conversion cycle (CCC) increased from 35 days to 58 days. This most likely indicates:',choices:['A) Working capital management deteriorated — more cash is tied up in operations','B) The company improved its supply chain','C) Revenue growth accelerated','D) The company is paying suppliers faster'],correct:'A',expl:'CCC = DSO + DIO - DPO. A rising CCC means more days of cash tied up in operations. This could reflect rising receivables (customers paying slower), rising inventory (demand slowdown), or falling payables days (paying suppliers faster). All reduce available cash and increase financing needs.'},
    {q:'Which statement about the relationship between net income and operating cash flow is most accurate?',choices:['A) Over a long period, cumulative CFO should approximate cumulative net income for a healthy business; persistent divergence indicates earnings quality concerns','B) CFO is always higher than net income because depreciation is added back','C) Net income is always a better measure of performance than CFO','D) Large differences between CFO and net income always indicate fraud'],correct:'A',expl:'Over time, accruals reverse and CFO should track net income. Short-term differences are normal (seasonality, growth). Persistent multi-year divergence — CFO consistently below net income — flags earnings quality issues. But differences alone do not prove fraud; they warrant investigation, not accusation.'},
    {q:'An analyst calculates that a company\'s quality of earnings ratio (CFO/Net Income) has averaged 0.62 over 5 years compared to an industry average of 0.95. The most appropriate conclusion is:',choices:['A) The company\'s earnings are likely of lower quality and warrant closer examination of revenue recognition and accrual policies','B) The company is growing faster than peers','C) The company has superior cash conversion','D) The ratio difference is immaterial and requires no action'],correct:'A',expl:'A ratio of 0.62 vs industry 0.95 means the company converts only 62 cents of each net income dollar into operating cash, while peers convert 95 cents. This persistent gap suggests aggressive accruals — potentially early revenue recognition, deferred expense recognition, or other accounting choices that boost reported income without generating cash.'},
  ],
  flashcards:[
    {front:'DuPont ROE formula (3-factor)',back:'ROE = Net Profit Margin × Asset Turnover × Equity Multiplier = (NI/Rev) × (Rev/Assets) × (Assets/Equity)'},
    {front:'Free Cash Flow to Equity (FCFE)',back:'FCFE = CFO - Capex + Net Borrowing. Cash available to equity holders after reinvestment and debt service.'},
    {front:'Accrual Ratio — what it signals',back:'(Net Income - CFO) / Avg Net Assets. High ratio = earnings driven by accruals, not cash. Red flag for earnings quality. Academic research shows high-accrual firms underperform.'},
  ],
},

// ════════════════════════════════════════════════════════════════════════
{
  id:'cfa1_fsa_02', exam:'CFA L1', section:'Financial Statement Analysis',
  title:'The Balance Sheet — Assets, Liabilities and Equity',
  narrative:[
    'The balance sheet presents a company\'s financial position at a single point in time, governed by the fundamental equation: Assets = Liabilities + Equity. Every transaction preserves this balance through double-entry bookkeeping. When a company borrows $1M to buy equipment, both assets and liabilities increase by $1M. When it earns and retains $500K, both cash (asset) and retained earnings (equity) increase. Understanding this mechanical balance is the foundation for detecting errors and manipulations.',
    'Assets are classified as current (expected to convert to cash within one year or operating cycle) or non-current. Current assets include cash, marketable securities, accounts receivable, inventory, and prepaid expenses — ordered by liquidity. Non-current assets include PP&E, intangible assets, goodwill, long-term investments, and deferred tax assets. The composition of assets tells a story about the business model: a capital-intensive manufacturer has most assets in PP&E, while a consulting firm has most in receivables and intangibles.',
    'Liabilities follow the same current/non-current classification. Current liabilities — accounts payable, accrued expenses, deferred revenue, current portion of long-term debt — must be settled within one year. The relationship between current assets and current liabilities (current ratio, quick ratio) determines short-term liquidity. Non-current liabilities — long-term debt, pension obligations, deferred tax liabilities, operating lease liabilities — represent longer-term financial commitments that analysts scrutinize for hidden leverage.',
    'Equity represents the residual interest after all liabilities are deducted. It consists of contributed capital (what shareholders paid in), retained earnings (accumulated net income less dividends), accumulated other comprehensive income (AOCI — unrealized gains/losses that bypass the income statement), and treasury stock (shares repurchased, shown as a deduction). Book value per share — total equity divided by shares outstanding — is a key reference point for valuation, though it often diverges from market value because assets are carried at historical cost rather than current fair value.',
  ],
  ifrsNote:'Under IFRS (IAS 16), companies may revalue PP&E and certain intangibles to fair value — increases go to revaluation surplus in equity, decreases to the income statement. GAAP strictly prohibits upward revaluation; assets stay at historical cost less accumulated depreciation. This means IFRS balance sheets can show higher asset values and equity, making P/B ratios not directly comparable across GAAP and IFRS companies. Analysts must adjust for revaluations when comparing firms across accounting regimes.',
  mnemonic:'CALLED — Cash, Accounts receivable, Loans (notes receivable), Liabilities (current), Equipment, Equity (long-term) — a rough balance sheet structure reminder.',
  outline:[
    'Current Assets: Cash → Marketable Securities → Accounts Receivable → Inventory → Prepaid Expenses',
    'Non-Current Assets: PP&E (net) → Intangibles → Goodwill → LT Investments → Deferred Tax Assets',
    'Current Liabilities: AP → Accrued Expenses → Deferred Revenue → Current LTD',
    'Non-Current Liabilities: LT Debt → Lease Liabilities → Pension Obligations → Deferred Tax Liabilities',
    'Equity: Common Stock + APIC + Retained Earnings + AOCI - Treasury Stock',
    'Key ratios: Current ratio, Quick ratio, Debt/Equity, Net Debt/EBITDA',
  ],
  questions:[
    {q:'A company has total assets of $900M, total liabilities of $580M, and 50M shares outstanding. Book value per share is:',choices:['A) $6.40','B) $11.60','C) $18.00','D) $16.00'],correct:'A',expl:'Book equity = Total assets - Total liabilities = $900M - $580M = $320M. Book value per share = $320M / 50M = $6.40. This is the accounting value per share, which often differs significantly from market price (P/B ratio). When P/B < 1, market values the company below book — common in distressed or value trap situations.'},
    {q:'Which of the following increases total assets without affecting net income?',choices:['A) Borrowing $5M from a bank','B) Recording $2M of depreciation','C) Recognizing $3M of revenue on credit','D) Paying $1M dividend'],correct:'A',expl:'Borrowing $5M increases cash (asset) and debt (liability) by equal amounts — total assets increase, equity unchanged, net income unaffected. Depreciation reduces PP&E (asset) and net income. Revenue recognition increases AR (asset) and net income. Dividend payment reduces cash (asset) and retained earnings (equity).'},
    {q:'A company has current assets of $240M (including $80M inventory and $20M prepaids) and current liabilities of $150M. The quick ratio is:',choices:['A) 0.93','B) 1.60','C) 1.07','D) 0.53'],correct:'A',expl:'Quick assets = Current assets - Inventory - Prepaids = $240M - $80M - $20M = $140M. Quick ratio = $140M / $150M = 0.93. Below 1.0 means quick assets don\'t fully cover current liabilities — not necessarily distressed (especially for retailers) but warrants monitoring. Current ratio = $240M/$150M = 1.60, which looks better but includes illiquid inventory.'},
    {q:'Under US GAAP, which of the following is NOT permitted for PP&E?',choices:['A) Upward revaluation of assets to fair value above historical cost','B) Straight-line depreciation','C) Component depreciation (depreciating parts separately)','D) Impairment write-down when carrying value exceeds fair value'],correct:'A',expl:'GAAP strictly prohibits upward revaluation of PP&E — assets can only go down from historical cost through depreciation and impairment, never up. IFRS (IAS 16) permits the revaluation model where increases go to equity revaluation surplus. This is one of the most important GAAP/IFRS differences for balance sheet comparability.'},
    {q:'Goodwill arises in a business combination when:',choices:['A) The purchase price exceeds the fair value of the identifiable net assets acquired','B) The acquired company has strong brand recognition','C) The acquirer pays less than book value for the target','D) The target company has negative retained earnings'],correct:'A',expl:'Goodwill = Purchase price - Fair value of identifiable net assets. It represents unidentifiable value — synergies, customer relationships, workforce in place. Under both GAAP (ASC 350) and IFRS (IAS 36), goodwill is not amortized but tested for impairment annually. A goodwill impairment reduces income but not operating cash flow.'},
    {q:'A company has gross PP&E of $600M and accumulated depreciation of $480M. The ratio of accumulated depreciation to gross PP&E is:',choices:['A) 80% — indicating an aging asset base likely requiring significant near-term capital expenditure','B) 20% — indicating relatively new assets','C) 80% — indicating the company has been investing heavily in new equipment','D) The ratio is irrelevant to capital expenditure analysis'],correct:'A',expl:'Accumulated depreciation / Gross PP&E = 80% means most of the asset\'s depreciable life has been consumed. Assets are old and approaching end of useful life — a capex cycle is likely approaching. Compare actual capex to depreciation: if capex/depreciation < 1.0x for multiple years, the company is underinvesting and capacity may be declining.'},
    {q:'Which statement about deferred tax liabilities (DTLs) is most accurate?',choices:['A) DTLs arise when taxable income is lower than accounting income, meaning taxes owed in the future — commonly from accelerated tax depreciation','B) DTLs represent taxes paid in advance','C) DTLs always reverse within one year','D) DTLs reduce a company\'s effective tax rate'],correct:'A',expl:'DTLs arise from temporary differences where tax rules defer income relative to GAAP. Accelerated depreciation for tax purposes reduces current taxable income below GAAP income, creating a future tax obligation (DTL). They are semi-permanent for growing companies continuously buying new assets. DTAs arise from the opposite — prepaid taxes or deductible losses carried forward.'},
    {q:'A company has $500M long-term debt, $80M cash, and EBITDA of $90M. Net debt/EBITDA is:',choices:['A) 4.7x','B) 5.6x','C) 4.2x','D) 6.3x'],correct:'A',expl:'Net debt = $500M - $80M = $420M. Net debt/EBITDA = $420M/$90M = 4.67x ≈ 4.7x. This is considered elevated leverage for most industries — rating agencies typically begin expressing concern above 3-4x. However, context matters: utilities can sustain 6-7x due to stable regulated cash flows.'},
    {q:'Operating lease liabilities on the balance sheet under ASC 842 (GAAP):',choices:['A) Increase reported debt and leverage ratios, making previously off-balance-sheet obligations visible','B) Reduce total liabilities by eliminating operating expense recognition','C) Are only recognized when lease payments exceed 12 months','D) Are identical to finance lease liabilities in income statement treatment'],correct:'A',expl:'ASC 842 and IFRS 16 brought virtually all leases onto the balance sheet. Previously, operating leases were off-balance-sheet and disclosed only in footnotes. Capitalization adds both a right-of-use asset and lease liability — dramatically increasing apparent leverage for retailers, airlines, and restaurants. Under GAAP, operating leases still show straight-line rent expense; finance leases show separate depreciation and interest.'},
    {q:'Treasury stock is best described as:',choices:['A) Shares previously issued and subsequently repurchased by the company — recorded as a deduction from equity at cost','B) Authorized shares that have never been issued','C) Shares held in a trust for employee compensation plans','D) Shares issued to founders at inception'],correct:'A',expl:'Treasury stock = shares bought back by the company. Under the cost method (US GAAP), treasury stock is recorded at repurchase cost as a contra-equity account — it reduces total equity. It reduces shares outstanding (denominator in EPS), which mechanically increases EPS. Treasury shares have no voting rights and receive no dividends.'},
    {q:'The equity multiplier in the DuPont framework equals:',choices:['A) Total assets divided by total equity — it measures financial leverage','B) Total equity divided by total assets','C) Long-term debt divided by equity','D) Net income divided by total equity'],correct:'A',expl:'Equity multiplier = Total Assets / Total Equity = 1 + Debt/Equity ratio. A multiplier of 3.0x means for every $1 of equity, the company has $3 of assets — implying $2 of debt financing. Higher multiplier = higher leverage = higher ROE (if profitable) but higher financial risk and fragility in downturns.'},
    {q:'A pension plan is "underfunded" when:',choices:['A) The projected benefit obligation (PBO) exceeds the fair value of plan assets — creating a net pension liability on the balance sheet','B) The company has not made the current year\'s pension contribution','C) Pension expense exceeds pension payments made during the year','D) The expected return on plan assets exceeds the discount rate'],correct:'A',expl:'Funded status = Fair value of plan assets - PBO. Negative funded status (PBO > assets) means the plan is underfunded — a net pension liability appears on the balance sheet. Underfunding can be masked by optimistic discount rate assumptions. A 50bp increase in discount rate can reduce PBO by 5-8%, improving apparent funded status without economic improvement.'},
    {q:'Which of the following would cause equity to increase without affecting net income?',choices:['A) An unrealized gain on available-for-sale securities recorded in OCI','B) Repurchasing shares at market price','C) Paying a stock dividend','D) Recording depreciation expense'],correct:'A',expl:'Unrealized AFS gains flow through OCI directly to equity (AOCI) — they bypass the income statement entirely until the security is sold. Share repurchases reduce equity (treasury stock). Stock dividends reclassify retained earnings to paid-in capital but don\'t change total equity. Depreciation reduces both PP&E and retained earnings (via net income).'},
    {q:'When comparing balance sheets across GAAP and IFRS companies in the same industry, the most significant difference an analyst should adjust for is:',choices:['A) PP&E revaluation under IFRS — which can make IFRS book values significantly higher than GAAP historical cost values','B) Goodwill amortization — IFRS amortizes goodwill while GAAP does not','C) Revenue recognition — IFRS recognizes revenue earlier than GAAP','D) Inventory classification — IFRS requires FIFO for all companies'],correct:'A',expl:'IFRS (IAS 16) permits PP&E revaluation to fair value. Companies in capital-intensive industries (real estate, mining, utilities) may carry assets at values far above historical cost, inflating book equity and reducing apparent leverage. GAAP companies cannot do this. Note: both GAAP and IFRS prohibited goodwill amortization (GAAP since 2001, IFRS since 2004 — though IFRS for SMEs still amortizes).'},
    {q:'Tangible book value per share is calculated as:',choices:['A) (Total equity - Goodwill - Intangible assets) / Shares outstanding','B) Total assets / Shares outstanding','C) (Total equity + Long-term debt) / Shares outstanding','D) Net income / Shares outstanding'],correct:'A',expl:'Tangible book value strips out goodwill and identifiable intangibles — assets whose value is most uncertain and hardest to realize in liquidation. It gives the most conservative view of per-share value. For acquisition analysis, tangible book value is critical because an acquirer may not realize the full value of intangibles. P/TBV is especially important for bank analysis.'},
  ],
  flashcards:[
    {front:'Quick Ratio formula',back:'(Cash + Short-term investments + Accounts receivable) / Current liabilities. Excludes inventory and prepaids. Tests immediate liquidity more stringently than current ratio.'},
    {front:'Goodwill — how it arises and accounting treatment',back:'Goodwill = Purchase price - FV of identifiable net assets. Not amortized under GAAP or IFRS. Tested annually for impairment. Impairment reduces income but NOT cash flow.'},
    {front:'IFRS vs GAAP: PP&E Revaluation',back:'IFRS (IAS 16): permits revaluation to fair value — increases go to equity revaluation surplus. GAAP: strictly prohibited — assets stay at historical cost less depreciation. Major comparability issue.'},
  ],
},

// CFA L1 — FSA: CASH FLOWS
// ════════════════════════════════════════════════════════════════════════
{
  id:'cfa1_fsa_03', exam:'CFA L1', section:'Financial Statement Analysis',
  title:'Cash Flow Statement — Analysis and Interpretation',
  narrative:[
    'The cash flow statement reconciles the beginning and ending cash balance through three activities: operating (CFO), investing (CFI), and financing (CFF). CFO captures cash generated by the core business — the most important and scrutinized number. CFI shows capital deployed in or received from long-term assets. CFF shows how the company raised and returned capital to providers. Understanding the interaction among these three sections reveals strategic choices and financial health far better than any single income statement metric.',
    'CFO is constructed using the indirect method (most common) or direct method. The indirect method starts with net income and adjusts for non-cash items (add back D&A, amortization, impairment, stock-based compensation) and working capital changes (subtract increases in current assets, add increases in current liabilities). Each line tells a story: a large "increase in deferred revenue" adjustment means customers paid before services were delivered — a healthy, predictable cash advance. A large "increase in accounts receivable" means revenue was booked but cash not yet received.',
    'Investing cash flows are almost always negative for growing companies — they reflect capital expenditures for property, plant, and equipment, acquisitions, and purchases of marketable securities. The critical metric is free cash flow: CFO minus capital expenditures. FCF represents the cash available after maintaining and growing the business — the currency of intrinsic value. A company reporting $200M net income but negative FCF is investing heavily in growth; whether this investment creates value depends on whether returns exceed the cost of capital.',
    'Financing cash flows capture debt and equity transactions. Issuing debt or equity produces positive CFF; repaying debt, paying dividends, or buying back stock produces negative CFF. Negative CFF is generally healthy for mature companies (returning capital) and concerning for struggling companies (burning through reserves). Analysts track the CFO/Net Income ratio as a quality metric — below 0.8x sustained over multiple years is a serious warning sign. The best businesses convert nearly every dollar of net income into operating cash flow.',
  ],
  ifrsNote:'IFRS (IAS 7) allows more flexibility in classifying cash flows. Interest paid can be classified as CFO or CFF under IFRS (GAAP requires CFO). Interest received and dividends received can be CFO or CFI under IFRS (GAAP requires CFO for both). Dividends paid can be CFO or CFF under IFRS (GAAP requires CFF). These differences mean IFRS companies can report higher CFO by classifying interest paid as CFF — always check footnotes when comparing CFO margins across GAAP and IFRS companies.',
  mnemonic:'INDIA — Indirect method adjustments: Non-cash add-backs (D&A), Deferred items, Inventory changes, Asset changes (working capital), rest are financing/investing.',
  outline:[
    'CFO (Indirect): Net Income + D&A + other non-cash + ΔWorking Capital',
    'Working capital: -ΔAR, -ΔInventory, -ΔPrepaid, +ΔAP, +ΔAccrued liabilities, +ΔDeferred revenue',
    'CFI: -Capex, -Acquisitions, +Asset disposals, ±Investments',
    'CFF: +Debt issued, -Debt repaid, +Equity issued, -Dividends, -Buybacks',
    'Free Cash Flow = CFO - Capex',
    'Quality ratio = CFO / Net Income (healthy: >0.9x; warning: <0.8x)',
    'FCFF = CFO + After-tax interest - Capex',
    'FCFE = CFO - Capex + Net borrowing',
  ],
  questions:[
    {q:'Net income is $60M, D&A is $15M, AR increased $20M, inventory decreased $8M, AP increased $12M, and capex is $25M. Free cash flow is:',choices:['A) $50M','B) $75M','C) $35M','D) $100M'],correct:'A',expl:'CFO = $60M + $15M - $20M + $8M + $12M = $75M. FCF = CFO - Capex = $75M - $25M = $50M. Note: inventory decrease adds cash (assets reduced), AP increase adds cash (liabilities increased). The $15M D&A is added back as non-cash. Always compute CFO first, then subtract capex.'},
    {q:'A company reports CFO of $40M and net income of $85M. The most likely explanation for CFO being significantly below net income is:',choices:['A) Large increases in accounts receivable or inventory consuming cash, or aggressive revenue recognition','B) High depreciation expense reducing net income','C) Large debt repayments reducing cash','D) The company paid a large dividend'],correct:'A',expl:'CFO below net income means the gap is filled by accruals — most commonly rising receivables (revenue recognized but uncollected) or rising inventory (cash spent before cost is recognized as expense). Debt repayments and dividends appear in CFF, not CFO. High D&A increases CFO relative to net income (added back), not the reverse.'},
    {q:'Under IFRS, a company classifies interest paid as a financing cash outflow. Compared to an identical GAAP company that must classify interest paid as operating, the IFRS company will report:',choices:['A) Higher CFO and lower CFF than the GAAP company','B) Lower CFO and higher CFF','C) Identical CFO — classification doesn\'t affect total cash','D) Higher CFO and higher CFF'],correct:'A',expl:'If interest paid goes to CFF (IFRS choice) rather than CFO (GAAP required), then CFO appears higher for the IFRS company. Total cash flow is identical — classification only shifts cash between sections. Analysts must restate IFRS companies to GAAP-equivalent CFO when comparing CFO margins across regimes.'},
    {q:'Which cash flow pattern is most consistent with a mature, financially healthy company?',choices:['A) CFO positive, CFI negative, CFF negative','B) CFO negative, CFI negative, CFF positive','C) CFO positive, CFI positive, CFF positive','D) CFO negative, CFI positive, CFF negative'],correct:'A',expl:'Mature healthy company: CFO positive (generating cash from operations), CFI negative (maintaining/growing assets — normal capex), CFF negative (returning capital via dividends/buybacks, repaying debt). Pattern B is a startup burning cash. Pattern C suggests selling assets. Pattern D is distressed — selling assets and burning operating cash.'},
    {q:'FCFF (Free Cash Flow to the Firm) is best used to value:',choices:['A) The entire enterprise (debt + equity) using WACC as the discount rate','B) Only the equity portion using cost of equity as the discount rate','C) A company\'s liquidation value','D) Terminal value only, not explicit period cash flows'],correct:'A',expl:'FCFF represents cash available to ALL capital providers (debt and equity). It is discounted at WACC to get enterprise value. Subtracting net debt gives equity value. FCFE (Free Cash Flow to Equity) represents only what\'s left for equity holders and is discounted at the cost of equity to get equity value directly.'},
    {q:'A company shows "proceeds from sale of property" of $80M in its cash flow statement. Where does this appear and how does it affect each section?',choices:['A) CFI positive $80M — it is an investing inflow from disposing of a long-term asset','B) CFO positive $80M — it improves operating performance','C) CFF positive $80M — it represents capital returned by an asset','D) Split between CFI and any gain going to CFO'],correct:'A',expl:'Asset disposals are investing cash flows — they appear as positive CFI. Any gain or loss on the sale is adjusted OUT of CFO in the indirect method (gains subtracted, losses added back — because the full cash proceeds are in CFI and the gain/loss is non-operating). This is why gains on asset sales must be removed when calculating normalized CFO.'},
    {q:'Which of the following is the most reliable indicator that a company\'s earnings are sustainable?',choices:['A) CFO consistently close to or above net income over multiple years','B) Steady revenue growth','C) Increasing gross margins','D) Declining SG&A as a percentage of revenue'],correct:'A',expl:'The single most powerful earnings sustainability indicator is persistent CFO tracking net income. It proves that accruals are reversing — that revenue eventually becomes cash and expenses are real obligations being settled. Revenue growth, margin improvements, and cost cutting can all be manufactured through accounting; cash cannot be faked for extended periods.'},
    {q:'A company\'s capital expenditure has been $40M, $35M, and $38M over the past three years, while depreciation was $50M, $52M, and $54M each year. This pattern suggests:',choices:['A) The company is underinvesting — capex below depreciation signals asset base erosion and potential future capacity constraints','B) The company is investing heavily for growth','C) The company is efficiently managing its asset base','D) Free cash flow must be negative'],correct:'A',expl:'When capex consistently trails depreciation, the company replaces assets slower than they wear out. Eventually capacity declines, maintenance costs rise, or emergency replacement capex hits. Capex/Depreciation < 1.0x for 3+ years is a red flag in capital-intensive industries. FCF can still be positive — this is a future cash flow risk, not a current one.'},
    {q:'Under the direct method of presenting CFO, which line item would appear?',choices:['A) Cash collected from customers','B) Depreciation expense','C) Change in accounts payable','D) Net income'],correct:'A',expl:'The direct method lists actual cash inflows and outflows: cash collected from customers, cash paid to suppliers, cash paid to employees, cash paid for interest and taxes. It does NOT start from net income (that is the indirect method). IASB encourages the direct method; it is used by fewer than 5% of companies because it requires more disclosure.'},
    {q:'A company\'s operating cash flow conversion ratio (CFO/EBITDA) has declined from 0.85 to 0.52 over three years. The most likely cause is:',choices:['A) Working capital has been absorbing cash — receivables and inventory building up faster than payables','B) Depreciation expense increased significantly','C) The company repaid a large amount of debt','D) Gross margins improved'],correct:'A',expl:'CFO/EBITDA declining means EBITDA is no longer converting to cash at historical rates. Since D&A is in both (EBITDA adds it back, CFO adds it back), the gap is driven by working capital. Rising receivables and inventory consume cash; this ratio deterioration signals demand problems (inventory buildup) or collection issues (receivables growth).'},
  ],
  flashcards:[
    {front:'IFRS vs GAAP: Cash flow classification flexibility',back:'IFRS: interest paid (CFO or CFF), interest received (CFO or CFI), dividends received (CFO or CFI), dividends paid (CFO or CFF). GAAP: interest paid/received = CFO; dividends received = CFO; dividends paid = CFF.'},
    {front:'Free Cash Flow to Firm (FCFF)',back:'FCFF = CFO + After-tax interest expense - Capex. Or: EBIT(1-t) + D&A - ΔWorking Capital - Capex. Used to value entire enterprise; discounted at WACC.'},
    {front:'CFO quality ratio interpretation',back:'CFO/Net Income. Healthy: >0.9x sustained. Warning: <0.8x for 3+ years = aggressive accruals. Below 0.5x = serious earnings quality concern. Ratio >1.2x consistently = conservative accounting.'},
  ],
},

// CPA FAR SECTION BEGINS

{
  id:'cpa_far_01', exam:'CPA FAR', section:'Financial Accounting & Reporting',
  title:'Revenue Recognition — ASC 606 Five-Step Model',
  narrative:[
    'ASC 606 (Revenue from Contracts with Customers) unified revenue recognition across all industries under a single five-step framework, replacing dozens of industry-specific rules. The five steps are: (1) Identify the contract with a customer; (2) Identify the performance obligations in the contract; (3) Determine the transaction price; (4) Allocate the transaction price to the performance obligations; (5) Recognize revenue when (or as) each performance obligation is satisfied. Mastery of this framework is essential — FAR consistently tests recognition timing, variable consideration, and multi-element arrangements.',
    'A performance obligation is satisfied when control of the promised good or service transfers to the customer — either at a point in time or over time. Control transfers over time if: the customer simultaneously receives and consumes the benefit (janitorial services), the entity\'s performance creates or enhances an asset the customer controls (custom construction on customer\'s land), or the entity\'s performance creates an asset with no alternative use and the entity has an enforceable right to payment for performance to date. Construction contracts typically qualify for over-time recognition using the percentage-of-completion method (input or output measures).',
    'Variable consideration — rebates, volume discounts, performance bonuses, returns — must be estimated and included in the transaction price only to the extent it is "highly probable" that a significant revenue reversal will not occur. This constraint prevents companies from booking optimistic variable amounts upfront. The standalone selling price of each performance obligation is estimated and the total transaction price allocated proportionally. Discounts are allocated to all obligations unless evidence shows the discount relates to specific obligations.',
    'Contract assets and liabilities are balance sheet presentations of timing differences. A contract asset (unbilled receivable) arises when revenue has been earned but the right to payment is conditional on something other than mere passage of time. Deferred revenue (contract liability) arises when payment is received before performance. These present differently on the balance sheet — deferred revenue is a liability; contract assets are assets. Analysts watch deferred revenue trends: growing deferred revenue is a positive leading indicator for future revenue.',
  ],
  ifrsNote:'IFRS 15 and ASC 606 are substantially converged — both use the same five-step model and were issued jointly by IASB and FASB in 2014. Minor differences exist in licenses of intellectual property (IFRS has a single model; GAAP distinguishes right-to-access from right-to-use licenses), sale and leaseback transactions, and certain transition provisions. For CPA FAR purposes, focus on ASC 606 exclusively. The convergence means GAAP/IFRS comparability for revenue is now much higher than for balance sheet items.',
  mnemonic:'I-I-D-A-R — Identify contract, Identify obligations, Determine price, Allocate price, Recognize revenue. The five steps of ASC 606 in order.',
  outline:[
    'Step 1 — Contract: written, oral, or implied; must have commercial substance and collectability probable',
    'Step 2 — Performance obligations: distinct goods/services (customer can benefit from it alone + separately identifiable)',
    'Step 3 — Transaction price: fixed + variable consideration (highly probable constraint) + financing component (>1 year) + non-cash + payable to customer',
    'Step 4 — Allocate: based on relative standalone selling prices (SSP)',
    'Step 5 — Recognize: point in time (control transfers) vs over time (3 criteria)',
    'Contract asset vs Contract liability (deferred revenue)',
    'Principal vs Agent (gross vs net recognition)',
    'Licenses: right to use (point in time) vs right to access (over time)',
  ],
  questions:[
    {q:'A software company sells a license ($300 SSP) and one year of support ($100 SSP) for a bundled price of $360. How should revenue be allocated?',choices:['A) License: $270, Support: $90','B) License: $300, Support: $60','C) License: $260, Support: $100','D) License: $360, Support: $0'],correct:'A',expl:'Total SSP = $400. Discount = $40. Allocate proportionally: License = $360 × ($300/$400) = $270. Support = $360 × ($100/$400) = $90. The $40 discount is spread across both obligations in proportion to SSP. Never allocate the full contract price to one element without evidence the discount relates only to that element.'},
    {q:'A construction company has a contract for $5M. At year-end, costs incurred are $1.5M and total estimated costs are $3.75M. Using the cost-to-cost method, revenue recognized is:',choices:['A) $2,000,000','B) $1,500,000','C) $3,750,000','D) $5,000,000'],correct:'A',expl:'Percentage complete = $1.5M/$3.75M = 40%. Revenue = 40% × $5M = $2,000,000. This is the input (cost-to-cost) method — most common for long-term contracts. The contract qualifies for over-time recognition because construction creates an asset on the customer\'s land with no alternative use. Gross profit = $2M - $1.5M = $500K.'},
    {q:'Under ASC 606, variable consideration is included in the transaction price when:',choices:['A) It is highly probable that including it will not result in a significant revenue reversal when uncertainty resolves','B) The amount can be reasonably estimated','C) The customer has agreed to it in writing','D) Collection is probable'],correct:'A',expl:'The "constraint" on variable consideration requires "highly probable" that including the amount won\'t cause a significant reversal. This is a high bar — higher than IFRS\'s "highly probable" which is generally interpreted similarly but applied in context. If there\'s significant uncertainty about achieving a bonus or avoiding returns, constrain the variable consideration down.'},
    {q:'A retailer sells $1M of gift cards. Historically, 10% of gift card value is never redeemed (breakage). When should breakage revenue be recognized?',choices:['A) Proportionally as gift cards are redeemed — in proportion to the pattern of expected redemption','B) Immediately when gift cards are sold','C) Only when the gift cards expire','D) Breakage is never recognized as revenue'],correct:'A',expl:'ASC 606 requires breakage revenue to be recognized proportionally as the related performance obligation is satisfied (as customers redeem). If 60% of cards have been redeemed and total expected breakage is $100K, recognize $60K of breakage revenue. This matches breakage recognition to redemption activity, preventing front-loading.'},
    {q:'Company A sells software licenses. The customer has the right to use the software as it exists today with no obligation from Company A to update it. Revenue should be recognized:',choices:['A) At a point in time when control transfers (delivery of license)','B) Over the license period on a straight-line basis','C) When the customer pays','D) Only after the customer uses the software'],correct:'A',expl:'Right-to-use licenses transfer a static right — the customer gets the IP as it exists. Control transfers at a point in time = recognize immediately upon delivery. Right-to-access licenses involve ongoing access to dynamic IP (like a constantly updated database) — those are recognized over time. This distinction is critical and frequently tested.'},
    {q:'A principal vs agent determination under ASC 606 affects whether revenue is recognized:',choices:['A) Gross (full transaction price as revenue) for principals vs net (commission only) for agents','B) Over time vs at a point in time','C) Earlier vs later in the contract period','D) On a cash vs accrual basis'],correct:'A',expl:'Principals control the good/service before transfer to the customer — they recognize gross revenue. Agents arrange for another party to provide the good/service — they recognize only the net fee/commission. Misclassifying as principal (gross) vs agent (net) is a common revenue inflation technique — watch for unusually high revenue with minimal COGS.'},
    {q:'A real estate developer sells condominiums before construction begins. Buyers pay deposits and sign binding contracts. The developer should recognize revenue:',choices:['A) Over time if the asset has no alternative use and the developer has an enforceable right to payment for performance to date; otherwise at point of time (delivery)','B) When deposits are received','C) When construction begins','D) Proportionally based on construction progress regardless of contract terms'],correct:'A',expl:'Over-time recognition requires: (1) no alternative use for the specific unit AND (2) enforceable right to payment for performance to date (typically supported by contract terms). If the developer can sell the unit to someone else or has no payment right for partially completed units, recognize at closing. This is a high-stakes exam topic because the answer depends on specific contract terms.'},
    {q:'A company receives $240,000 on January 1 for a 24-month SaaS subscription. Revenue recognized in year 1 is:',choices:['A) $120,000','B) $240,000','C) $0 — until service period begins','D) $10,000 per month, totaling $120,000 only after the subscriber uses it'],correct:'A',expl:'The performance obligation (providing SaaS access) is satisfied over time — the customer simultaneously receives and consumes the service each month. Year 1 revenue = $240,000 × (12/24) = $120,000. $120,000 remains as deferred revenue (contract liability) at year-end. This is the core principle: revenue matches the pattern of performance obligation satisfaction.'},
    {q:'Contract costs to obtain a contract (e.g., sales commissions) are recognized as:',choices:['A) An asset and amortized over the expected customer relationship period if expected to be recovered; expensed immediately if amortization period would be ≤1 year','B) Always expensed immediately as incurred','C) Capitalized and tested for impairment annually','D) Recognized as revenue offsets'],correct:'A',expl:'ASC 606 requires capitalizing incremental contract acquisition costs (sales commissions) if they are expected to be recovered. Amortize on a basis consistent with the transfer of goods/services — typically contract period plus renewal periods if commission is not paid on renewal. Practical expedient: expense if amortization period ≤1 year. This asset appears as a current or non-current asset depending on amortization timing.'},
    {q:'A manufacturer sells equipment for $500,000 with payment due in 3 years (market interest rate 8%). The transaction price is:',choices:['A) $396,916 — the present value of $500,000 discounted at 8% for 3 years','B) $500,000 — the stated contract price','C) $500,000 minus the interest that will be earned','D) Depends on whether the customer has other financing options'],correct:'A',expl:'When the payment timing provides a significant financing benefit (>1 year), ASC 606 requires separation of the financing component. PV = $500,000/(1.08)^3 = $396,916. Revenue is $396,916; interest income of $103,084 is recognized separately over 3 years using the effective interest method. This prevents front-loading revenue with embedded financing.'},
    {q:'Disclosure requirements under ASC 606 include all of the following EXCEPT:',choices:['A) The names and contact information of the top 10 customers','B) Disaggregation of revenue into categories that depict how revenue and cash flows are affected by economic factors','C) Information about contract balances (contract assets and liabilities)','D) Information about remaining performance obligations'],correct:'A',expl:'ASC 606 requires extensive disclosures: disaggregated revenue, contract balances (opening/closing contract assets and liabilities), remaining performance obligations, and significant judgments. It does NOT require disclosure of specific customer names — that would be competitively sensitive and is not required. Disaggregation can be by geography, product type, customer type, or contract duration.'},
    {q:'A company sells 1,000 units to a distributor with a right of return for 60 days. Historically, 5% are returned. How much revenue should be recognized at point of sale?',choices:['A) $950 per unit equivalent — recognize for 950 units, defer for expected 50 returns','B) Full 1,000 units — right of return doesn\'t affect recognition','C) Zero until the return period expires','D) Only for units the distributor has re-sold to end customers'],correct:'A',expl:'ASC 606 requires recognizing revenue only for the goods the customer is expected to keep. Estimate returns (50 units) and recognize revenue for 950 units. Record a refund liability for the expected return amount and a right-of-return asset (for the goods expected back). Revise estimates each period. The return right alone does not prevent recognition — only the estimated quantity returned is deferred.'},
    {q:'Under the percentage-of-completion method, a contract shows a projected loss at completion. The loss should be:',choices:['A) Recognized in full immediately in the current period — the entire projected loss, not just the current period portion','B) Spread over the remaining contract period','C) Recognized only when the contract is complete','D) Disclosed in footnotes but not recognized until cash is received'],correct:'A',expl:'Onerous contracts (contracts where expected costs exceed expected revenue) require immediate full loss recognition under ASC 606 (and IAS 11/IFRS 15). The entire projected loss is recognized in the period it becomes apparent — you cannot defer a known loss. This conservative principle prevents management from hiding losses by spreading them over future periods.'},
    {q:'A franchise company receives a $50,000 upfront franchise fee and $5,000/month royalties. The franchise agreement includes equipment, training, and ongoing support. How should the $50,000 be recognized?',choices:['A) Allocated among distinct performance obligations (equipment, training, license) and recognized when each is satisfied','B) Recognized immediately when received','C) Deferred and recognized over the franchise term','D) Recognized when the franchisee opens for business'],correct:'A',expl:'The $50,000 must be allocated to each distinct performance obligation at relative SSP. Equipment and training are likely point-in-time obligations recognized when delivered/completed. The franchise license may be over-time (right to access the brand, with ongoing support). This bundle must be disaggregated — the old "lump sum recognized at opening" approach was eliminated by ASC 606.'},
    {q:'When a company acts as an agent (not principal) in a transaction, which indicator is most relevant?',choices:['A) The company does not control the product or service before it is transferred to the customer','B) The company sets the final price to the customer','C) The company bears inventory risk','D) The company is primarily responsible for fulfillment'],correct:'A',expl:'The core agent indicator is lack of control before transfer. Supporting indicators that suggest agency: another party is primarily responsible for fulfillment, company has no inventory risk, company\'s compensation is in the form of a commission, company has no credit risk on the transaction. If a company controls the product before the customer gets it — it\'s a principal.'},
  ],
  flashcards:[
    {front:'ASC 606 Five Steps (IIDAL)',back:'1-Identify contract, 2-Identify performance obligations, 3-Determine transaction price, 4-Allocate to obligations, 5-Recognize when satisfied. Mnemonic: I-I-D-A-R'},
    {front:'Over-time revenue recognition — 3 criteria (only need ONE)',back:'(1) Customer receives and consumes benefit as entity performs; (2) Entity creates/enhances asset customer controls; (3) No alternative use + enforceable right to payment for performance to date.'},
    {front:'Variable consideration constraint',back:'Include variable amounts only if HIGHLY PROBABLE that including them will NOT result in a significant revenue reversal when uncertainty resolves. High bar — if uncertain, constrain downward.'},
  ],
},
